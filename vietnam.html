<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/paginas.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <title>Vietnam</title>
</head>
<body>

    <nav class="nav-tierra">
        <model-viewer
            src="earth/scene.gltf"
            camera-controls
            auto-rotate
            interaction-prompt="none"
            shadow-intensity="1"
            environment-image="neutral"
            exposure="1">
        </model-viewer>
    </nav>

    <div class="page-header">
        <div class="label">U.S. Military Occupation</div>
        <h1>Vietnam — 1955–1975</h1>
        <div class="meta">Nov 1 1955 - Apr 30 1975 &nbsp;/&nbsp; </div>
    </div>

    <div class="db-container">
        <div class="db-cols">
            <span>Source</span>
            <span>Type</span>
            <span>Date</span>
            <span>Description</span>
        </div>

        <div class="db-row" data-img="imgs/vietnam/provisional-government.jpg" data-caption="Hiroshima — August 6, 1945. The first atomic bomb dropped on a civilian population." data-label="AP WIRE PHOTO — Hiroshima">
            <span class="source">Vietnam Courier, Hanoi</span>
            <span class="type">PHOTOGRAPH</span>
            <span class="date">JUN 23 1969</span>
            <span class="desc">Provisional government</span>
        </div>

    </div>

    <div class="viewer" id="viewer">
        <div class="db-container" style="padding-top:0">
            <div class="viewer-header" id="viewer-label">— SELECT A ROW —</div>
            <div class="viewer-placeholder" id="viewer-placeholder">[IMAGE PLACEHOLDER]</div>
            <img class="viewer-img" id="viewer-img" src="" alt="" style="display:none">
            <div class="viewer-caption" id="viewer-caption"></div>
        </div>
    </div>

    <div id="popup-container"></div>


    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <script src="js/pop-ups-vietnam.js"></script>
    <script src="js/random-pais.js"></script>
    <script src="js/tierra.js"></script>
</body>
</html>
